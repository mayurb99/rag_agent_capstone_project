apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: mayurbrijwani/medical-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          
          env:
        
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: PINECONE_API_KEY

            - name: HUGGINGFACEHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: HUGGINGFACEHUB_API_TOKEN

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: DB_NAME

            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: DB_HOST
            
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: DB_PASSWORD

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: DB_USER
          




---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
